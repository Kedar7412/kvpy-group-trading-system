<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Asset Scorer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --panel2: #222b38; --text: #e6edf3;
    --muted: #8b98a9; --line: #2d3744; --accent: #4da3ff;
    --green: #3fb950; --green2: #2ea043; --yellow: #d29922; --red: #f85149;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  .controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  select, button { background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px;
    font-size: 13px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button:disabled { opacity: .5; cursor: wait; }
  main { padding: 20px 24px; display: grid; gap: 20px;
    grid-template-columns: 1fr 1fr; }
  .panel { background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 16px; }
  .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); margin: 0 0 12px; font-weight: 600; }
  .full { grid-column: 1 / -1; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 7px 8px; border-bottom: 1px solid var(--line); }
  th:nth-child(2), td:nth-child(2) { text-align: left; }
  th { color: var(--muted); font-weight: 600; font-size: 11px;
    text-transform: uppercase; cursor: default; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--panel2); }
  tbody tr.sel { background: #243043; }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: 11px; font-weight: 600; }
  .score { font-weight: 700; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat { background: var(--panel2); border-radius: 8px; padding: 10px 12px; }
  .stat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; }
  .stat .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .muted { color: var(--muted); }
  .factorcell { width: 44px; }
  canvas { max-height: 280px; }
  .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }
  .syn { color: var(--yellow); }
</style>
</head>
<body>
<header>
  <div>
    <h1>Asset Scorer</h1>
    <div class="sub" id="subtitle">multi-factor scores with calibrated confidence</div>
  </div>
  <div class="controls">
    <select id="classSelect"></select>
    <button id="refreshBtn" title="Fetch live data, score, and save">Refresh (live)</button>
    <button id="refreshSynBtn" title="Score with offline synthetic data">Demo data</button>
  </div>
</header>

<main>
  <section class="panel full">
    <h2>Run diagnostics</h2>
    <div class="stat-grid" id="stats"></div>
    <div class="hint" id="runHint"></div>
  </section>

  <section class="panel full">
    <h2>Latest scores <span class="muted" id="scoresMeta"></span></h2>
    <div id="tableWrap"><p class="muted">Loading…</p></div>
  </section>

  <section class="panel">
    <h2>Score history <span class="muted" id="histSym"></span></h2>
    <canvas id="histChart"></canvas>
    <div class="hint">Click a row above to see its history. One point per stored daily run.</div>
  </section>

  <section class="panel">
    <h2>Factor breakdown <span class="muted" id="factorSym"></span></h2>
    <canvas id="factorChart"></canvas>
    <div class="hint">Normalized 0–100 factor scores for the selected asset (50 = universe average).</div>
  </section>
</main>

<script>
const FACTORS = ["news", "technicals", "fundamentals", "orderflow", "indicators"];
let state = { ac: "crypto", selected: null, scores: [] };
let histChart = null, factorChart = null;

function scoreColor(v) {
  if (v == null || isNaN(v)) return "var(--muted)";
  if (v >= 65) return "var(--green)";
  if (v >= 50) return "var(--green2)";
  if (v >= 35) return "var(--yellow)";
  return "var(--red)";
}
function bubbleColor(label) {
  if (!label) return "var(--muted)";
  if (label.includes("bubble-risk")) return "var(--red)";
  if (label.includes("hot") || label.includes("warming")) return "var(--yellow)";
  return "var(--muted)";
}
function callColor(call) {
  if (call === "FAVORED") return "var(--green)";
  if (call === "AVOID-BUBBLE") return "var(--red)";
  if (call === "AVOID") return "var(--red)";
  if (call === "NEUTRAL") return "var(--yellow)";
  return "var(--muted)";  // NO-EDGE
}
function fmt(v, d = 0) { return (v == null || isNaN(v)) ? "–" : Number(v).toFixed(d); }
function pct(v) { return (v == null || isNaN(v)) ? "–" : Math.round(v * 100) + "%"; }

async function getJSON(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
  return r.json();
}

async function loadClasses() {
  const classes = await getJSON("/api/asset-classes");
  const sel = document.getElementById("classSelect");
  sel.innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join("");
  sel.value = classes.includes(state.ac) ? state.ac : classes[0];
  state.ac = sel.value;
}

function renderStats(run, asOf) {
  const el = document.getElementById("stats");
  if (!run) { el.innerHTML = `<div class="muted">No saved runs yet — click “Refresh” or “Demo data”.</div>`;
    document.getElementById("runHint").textContent = ""; return; }
  const skill = run.skill_score;
  const skillColor = skill == null ? "var(--muted)" : (skill > 0 ? "var(--green)" : "var(--red)");
  const cells = [
    ["As of", asOf || "–"],
    ["Source", run.data_source || "–"],
    ["Assets", run.n_assets ?? "–"],
    ["Calib. skill", `<span style="color:${skillColor}">${fmt(skill, 4)}</span>`],
    ["Brier", fmt(run.brier_score, 4)],
    ["Backtest IC", fmt(run.information_coefficient, 4)],
    ["Top–bottom", fmt(run.top_minus_bottom, 5)],
    ["Hit rate", run.hit_rate == null ? "–" : pct(run.hit_rate)],
  ];
  el.innerHTML = cells.map(([k, v]) =>
    `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
  document.getElementById("runHint").innerHTML =
    `Calibration skill &gt; 0 means the confidence beats a naive base-rate guess. ` +
    `IC &gt; 0 means higher scores preceded higher forward returns.`;
}

function renderTable(scores) {
  const wrap = document.getElementById("tableWrap");
  if (!scores.length) { wrap.innerHTML = `<p class="muted">No scores stored for this class yet.</p>`; return; }
  const head = `<tr><th>#</th><th>Symbol</th><th>Call</th><th>Score</th><th>Conf</th><th>Crash</th>` +
    FACTORS.map(f => `<th>${f.slice(0,4)}</th>`).join("") + `</tr>`;
  const rows = scores.map(s => {
    const syn = s.synthetic ? ` <span class="syn" title="synthetic data">*</span>` : "";
    const fcells = FACTORS.map(f => {
      const v = s[f];
      return `<td class="factorcell" style="color:${scoreColor(v)}">${fmt(v)}</td>`;
    }).join("");
    const crash = s.bubble_probability;
    const crashStyle = crash >= 0.6 ? "var(--red)" : (crash >= 0.35 ? "var(--yellow)" : "var(--muted)");
    return `<tr data-sym="${s.symbol}">
      <td>${s.rank}</td>
      <td>${s.symbol}${syn}</td>
      <td><span class="pill" style="color:${callColor(s.call)};border:1px solid ${callColor(s.call)}">${s.call || "-"}</span></td>
      <td class="score" style="color:${scoreColor(s.final_score)}">${fmt(s.final_score, 1)}</td>
      <td>${pct(s.confidence)}</td>
      <td style="color:${crashStyle}">${crash == null ? "-" : Math.round(crash*100)+"%"}</td>
      ${fcells}
    </tr>`;
  }).join("");
  wrap.innerHTML = `<table><thead>${head}</thead><tbody>${rows}</tbody></table>`;
  wrap.querySelectorAll("tbody tr").forEach(tr => {
    tr.onclick = () => selectSymbol(tr.dataset.sym);
  });
}

async function loadScores() {
  document.getElementById("scoresMeta").textContent = "";
  const data = await getJSON(`/api/scores?asset_class=${encodeURIComponent(state.ac)}`);
  state.scores = data.scores;
  renderStats(data.run, data.as_of);
  renderTable(data.scores);
  document.getElementById("scoresMeta").textContent =
    data.as_of ? `· ${data.scores.length} assets · as of ${data.as_of}` : "";
  if (data.scores.length) {
    const keep = data.scores.find(s => s.symbol === state.selected);
    selectSymbol(keep ? keep.symbol : data.scores[0].symbol);
  } else {
    state.selected = null;
  }
}

async function selectSymbol(sym) {
  state.selected = sym;
  document.querySelectorAll("tbody tr").forEach(tr =>
    tr.classList.toggle("sel", tr.dataset.sym === sym));
  document.getElementById("histSym").textContent = "· " + sym;
  document.getElementById("factorSym").textContent = "· " + sym;
  renderFactorChart(state.scores.find(s => s.symbol === sym));
  const h = await getJSON(
    `/api/history?symbol=${encodeURIComponent(sym)}&asset_class=${encodeURIComponent(state.ac)}`);
  renderHistChart(h.history);
}

function renderHistChart(history) {
  const labels = history.map(r => r.as_of);
  const score = history.map(r => r.final_score);
  const conf = history.map(r => r.confidence == null ? null : r.confidence * 100);
  const ctx = document.getElementById("histChart");
  if (histChart) histChart.destroy();
  histChart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets: [
      { label: "Score", data: score, borderColor: "#4da3ff", backgroundColor: "rgba(77,163,255,.1)",
        tension: .25, fill: true, yAxisID: "y" },
      { label: "Confidence %", data: conf, borderColor: "#3fb950", tension: .25,
        borderDash: [5,4], yAxisID: "y" },
    ]},
    options: { responsive: true, interaction: { mode: "index", intersect: false },
      plugins: { legend: { labels: { color: "#8b98a9" } } },
      scales: {
        x: { ticks: { color: "#8b98a9", maxTicksLimit: 8 }, grid: { color: "#2d3744" } },
        y: { min: 0, max: 100, ticks: { color: "#8b98a9" }, grid: { color: "#2d3744" } },
      } }
  });
}

function renderFactorChart(s) {
  if (!s) return;
  const data = FACTORS.map(f => s[f]);
  const colors = data.map(v => scoreColor(v));
  const ctx = document.getElementById("factorChart");
  if (factorChart) factorChart.destroy();
  factorChart = new Chart(ctx, {
    type: "bar",
    data: { labels: FACTORS, datasets: [{ label: "Score", data, backgroundColor: colors }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#8b98a9" }, grid: { display: false } },
        y: { min: 0, max: 100, ticks: { color: "#8b98a9" }, grid: { color: "#2d3744" } },
      } }
  });
}

async function refresh(synthetic) {
  const btns = document.querySelectorAll("header button");
  btns.forEach(b => b.disabled = true);
  const lbl = synthetic ? "Demo data" : "Refresh (live)";
  const btn = synthetic ? document.getElementById("refreshSynBtn") : document.getElementById("refreshBtn");
  btn.textContent = "Working…";
  try {
    await getJSON(`/api/refresh?asset_class=${encodeURIComponent(state.ac)}&synthetic=${synthetic}`,
      { method: "POST" });
    await loadScores();
  } catch (e) {
    alert("Refresh failed: " + e.message);
  } finally {
    btns.forEach(b => b.disabled = false);
    btn.textContent = lbl;
  }
}

document.getElementById("classSelect").onchange = (e) => {
  state.ac = e.target.value; state.selected = null; loadScores();
};
document.getElementById("refreshBtn").onclick = () => refresh(false);
document.getElementById("refreshSynBtn").onclick = () => refresh(true);

(async function init() {
  await loadClasses();
  await loadScores();
})();
</script>
</body>
</html>
